name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: saasapp
          environment_name: Saasapp-env
          version_label: ${{ github.sha }}
          region: us-east-1
          deployment_package: target/saasapp-0.0.1-SNAPSHOT.jar    # just changed
          wait_for_environment_recovery: 180   # just changed
          #environment_variables:
          #  SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          #  SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
          # SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          #  APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}
          #  APP_JWT_EXPIRATION=${{ secrets.APP_JWT_EXPIRATION }}