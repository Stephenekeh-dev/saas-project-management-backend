spring.application.name=saasapp

# ========== Datasource ==========
spring.datasource.url=jdbc:postgresql://localhost:5432/saas_db
spring.datasource.username=postgres
spring.datasource.password=1234567Steven..,
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== Flyway ==========
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ========== JPA / Hibernate ==========
# Let Flyway own the schema; Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ========== JWT ==========
app.jwt.secret=u8F3nD9sK2qL1vR5bX7zW6pT4mQ0yA8e
# 1 day in milliseconds
app.jwt.expiration=86400000

# ========== Logging ==========
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG

# ========== Actuator ==========
management.endpoints.web.exposure.include=health,info,metrics,httpexchanges,heapdump
management.endpoint.heapdump.enabled=true
management.endpoint.metrics.enabled=true

# ========== Swagger ==========
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true