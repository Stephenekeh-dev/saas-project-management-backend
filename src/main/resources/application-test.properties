# Test profile ? uses H2 in-memory database instead of PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway for tests Hibernate creates schema via create-drop
spring.flyway.enabled=false

# JWT (required by context but not used in repository/slice tests)
# app.jwt.secret=test-secret-key-that-is-32-chars!!
app.jwt.secret=u8F3nD9sK2qL1vR5bX7zW6pT4mQ0yA8e
app.jwt.expiration=3600000
